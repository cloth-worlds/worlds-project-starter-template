name: Lint

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        uv sync

    - name: Run Ruff linter
      run: |
        uv run ruff check .
